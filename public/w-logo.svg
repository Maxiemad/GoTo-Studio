<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 50" fill="none">
  <!-- Sunflower mark -->
  <g transform="translate(25,25)">
    <!-- Outer petals -->
    <g fill="#C5A028">
      <ellipse cx="0" cy="-12" rx="4.5" ry="7" transform="rotate(0)"/>
      <ellipse cx="0" cy="-12" rx="4.5" ry="7" transform="rotate(30)"/>
      <ellipse cx="0" cy="-12" rx="4.5" ry="7" transform="rotate(60)"/>
      <ellipse cx="0" cy="-12" rx="4.5" ry="7" transform="rotate(90)"/>
      <ellipse cx="0" cy="-12" rx="4.5" ry="7" transform="rotate(120)"/>
      <ellipse cx="0" cy="-12" rx="4.5" ry="7" transform="rotate(150)"/>
      <ellipse cx="0" cy="-12" rx="4.5" ry="7" transform="rotate(180)"/>
      <ellipse cx="0" cy="-12" rx="4.5" ry="7" transform="rotate(210)"/>
      <ellipse cx="0" cy="-12" rx="4.5" ry="7" transform="rotate(240)"/>
      <ellipse cx="0" cy="-12" rx="4.5" ry="7" transform="rotate(270)"/>
      <ellipse cx="0" cy="-12" rx="4.5" ry="7" transform="rotate(300)"/>
      <ellipse cx="0" cy="-12" rx="4.5" ry="7" transform="rotate(330)"/>
    </g>
    <!-- Inner petals -->
    <g fill="#B8941F">
      <ellipse cx="0" cy="-7" rx="3" ry="5" transform="rotate(15)"/>
      <ellipse cx="0" cy="-7" rx="3" ry="5" transform="rotate(45)"/>
      <ellipse cx="0" cy="-7" rx="3" ry="5" transform="rotate(75)"/>
      <ellipse cx="0" cy="-7" rx="3" ry="5" transform="rotate(105)"/>
      <ellipse cx="0" cy="-7" rx="3" ry="5" transform="rotate(135)"/>
      <ellipse cx="0" cy="-7" rx="3" ry="5" transform="rotate(165)"/>
      <ellipse cx="0" cy="-7" rx="3" ry="5" transform="rotate(195)"/>
      <ellipse cx="0" cy="-7" rx="3" ry="5" transform="rotate(225)"/>
      <ellipse cx="0" cy="-7" rx="3" ry="5" transform="rotate(255)"/>
      <ellipse cx="0" cy="-7" rx="3" ry="5" transform="rotate(285)"/>
      <ellipse cx="0" cy="-7" rx="3" ry="5" transform="rotate(315)"/>
      <ellipse cx="0" cy="-7" rx="3" ry="5" transform="rotate(345)"/>
    </g>
    <circle cx="0" cy="0" r="3" fill="#C5A028"/>
  </g>
  <!-- Text -->
  <text x="50" y="32" font-family="system-ui, sans-serif" font-weight="600" font-size="18" fill="white" letter-spacing="-0.5">goto studio ai</text>
</svg>
